# ============================================================
# 设备检修AI系统 - Nginx 配置
# 适配：银河麒麟 V10/V11 + LoongArch
# 使用方法：
#   sudo cp deploy/nginx.conf /etc/nginx/conf.d/equipment-maintenance.conf
#   sudo nginx -t
#   sudo systemctl restart nginx
# ============================================================

server {
    listen       80;
    server_name  _;
    charset      utf-8;

    # 日志
    access_log  /var/log/nginx/equipment-maintenance.access.log;
    error_log   /var/log/nginx/equipment-maintenance.error.log;

    # 前端静态文件
    # 把 PROJECT_ROOT 替换成你项目的 deploy 绝对路径，例如：
    # root /home/vmuser/deploy/frontend/dist;
    root  /home/vmuser/deploy/frontend/dist;
    index index.html;

    # Gzip 压缩（显著提升首屏加载速度）
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;

    # Vue Router history 模式兜底
    location / {
        try_files $uri $uri/ /index.html;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # 静态资源长缓存（Vite 构建带 hash）
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable, max-age=2592000";
        access_log off;
    }

    # 后端 API 反向代理
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # AI 响应可能较慢，超时放宽
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 10s;

        # 流式响应支持（如果未来加 SSE）
        proxy_buffering off;
    }

    # 健康检查端点
    location /health {
        proxy_pass         http://127.0.0.1:8000/health;
        proxy_set_header   Host              $host;
        access_log off;
    }

    # 禁止隐藏文件访问
    location ~ /\. {
        deny all;
    }
}
